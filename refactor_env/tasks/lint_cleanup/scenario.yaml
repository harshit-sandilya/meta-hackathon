slug: lint_cleanup
name: "Single-File Lint Cleanup"
description: >
  A data-processing utility module ships with 12 planted lint violations
  across five rule categories: unused imports (F401), a bare except clause
  (E722), a mutable default argument (B006), comparisons to None with ==
  (E711), an unused loop variable (B007), an unused local variable (F841),
  an ambiguous variable name (E741), and an overlong function signature
  (E501). The agent must eliminate all violations without altering any
  observable behaviour or touching the test suite.

difficulty: easy
language: python
max_steps: 15
style_guide: pep8

# ── Grader configuration ────────────────────────────────────────────────────
# Maps each active reward component to its grader name.
# Components with weight 0.0 are skipped automatically by metrics.py.
graders:
  acc: pytest_grader # runs pytest, returns pass_ratio
  qual: ruff_grader # counts ruff violations, returns delta score
  eff: step_efficiency # pure arithmetic, no subprocess

# Ruff: which rules to check. Grader only counts violations in this set.
lint_rules:
  select: ["F401", "E722", "B006", "E711", "B007", "F841", "E741", "E501"]
  ignore: []

# Baseline violation count used by ruff_grader to compute delta score.
# Set to the number of planted violations in the task repo.
baseline_violations: 12

# Where pytest should discover tests (relative to sandbox root).
test_paths:
  - "tests/"

# Efficiency formula: score = max(0, 1 - (steps_used / max_steps) * decay_rate)
# decay_rate 0.5 means reaching max_steps gives eff = 0.5 (not 0),
# rewarding any completion over timeout.
eff_config:
  decay_rate: 0.5

reward_weights:
  acc: 0.30
  qual: 0.60
  eff: 0.10
  fmt: 0.00

invariants:
  - type: no_edit
    paths: ["tests/"]
    message: "The test suite is read-only — fix the source, not the tests."
  - type: file_exists
    paths: ["utils.py"]
    message: "utils.py must not be deleted or renamed."

penalties:
  syntax_error: 0.30
  repeated_noop: 0.10
  broken_import: 0.20

repo_path: "tasks/lint-cleanup/repo"
